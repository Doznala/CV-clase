<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SNAKE JS</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { background: #000; border: 3px solid #444; border-radius: 8px; cursor: default; margin-top: 20px; }
        .instructions { margin-top: 10px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

    <h1 id="gameTitle">SNAKE JS</h1>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="controlsText" class="instructions">
        <p>⌨️ Flechas de dirección | Haz clic para iniciar</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Empieza pausado para obligar a hacer clic para iniciar
        let gameRunning = false;
        let endMessage = "¡SNAKE JS!";
        let firstStart = true;
        let particles = [];

        // --- VARIABLES SNAKE ---
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0, nextDx = 1, nextDy = 0;
        let snakeScore = 0, gridSize = 20;
        
        let snakeTimeAccumulator = 0; 
        const snakeStepDuration = (1000 / 60) * 7; 

        window.addEventListener("keydown", (e) => {
            if (!gameRunning) return;
            if(e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -1; e.preventDefault(); }
            if(e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = 1; e.preventDefault(); }
            if(e.key === "ArrowLeft" && dx === 0) { nextDx = -1; nextDy = 0; e.preventDefault(); }
            if(e.key === "ArrowRight" && dx === 0) { nextDx = 1; nextDy = 0; e.preventDefault(); }
        });

        canvas.addEventListener("mousedown", () => {
            if (!gameRunning) {
                firstStart = false;
                resetCurrentGame();
            }
        });

        function resetCurrentGame() {
            gameRunning = true;
            particles = [];
            snake = [{x: 10, y: 10}];
            nextDx = 1; nextDy = 0; dx = 1; dy = 0;
            snakeScore = 0; 
            snakeTimeAccumulator = 0;
            spawnFood();
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize));
            food.y = Math.floor(Math.random() * (canvas.height / gridSize));
        }

        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) particles.push({x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, alpha:1, color});
        }

        function update(dt) {
            if (!gameRunning) return;

            snakeTimeAccumulator += dt;

            if (snakeTimeAccumulator >= snakeStepDuration) {
                snakeTimeAccumulator -= snakeStepDuration;
                
                dx = nextDx; dy = nextDy;
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};

                if (head.x < 0 || head.x >= canvas.width/gridSize || head.y < 0 || head.y >= canvas.height/gridSize || 
                    snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                    gameRunning = false; endMessage = "🐍 ¡GAME OVER!"; return;
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    snakeScore++; createParticles(food.x * gridSize, food.y * gridSize, "#0f0"); spawnFood();
                } else { snake.pop(); }
            }
        }

        function render(dt) {
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const dtModifier = dt / (1000 / 60);

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dtModifier; p.y += p.vy * dtModifier; p.alpha -= 0.03 * dtModifier;
                if(p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
                }
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.textAlign="left";
            ctx.fillText("Puntos: " + snakeScore, 20, 30);
            
            ctx.fillStyle = "#f00"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);
            
            ctx.fillStyle = "#0f0"; 
            snake.forEach(seg => ctx.fillRect(seg.x * gridSize, seg.y * gridSize, gridSize-2, gridSize-2));

            if (!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,500);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "50px Arial";
                ctx.fillText(endMessage, 400, 240);
                ctx.font = "20px Arial"; ctx.fillStyle = "#00d2ff";
                ctx.fillText(firstStart ? "HAZ CLIC PARA INICIAR" : "HAZ CLIC PARA REINICIAR", 400, 300);
            }
        }

        let lastTime = performance.now();
        function loop(timestamp) {
            if (!timestamp) timestamp = performance.now();

            let dt = timestamp - lastTime;
            if (dt > 100) dt = 16.66;
            lastTime = timestamp;

            update(dt);
            render(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame((timestamp) => loop(timestamp));
    </script>
</body>
</html>
