<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PONG JS</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { background: #000; border: 3px solid #444; border-radius: 8px; cursor: crosshair; margin-top: 20px; }
        .instructions { margin-top: 10px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

    <h1 id="gameTitle">PONG JS</h1>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="controlsText" class="instructions">
        <p>⌨️ Flechas | 🖱️ Arrastra la paleta</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let gameRunning = false;
        let endMessage = "¡PONG JS!";
        let firstStart = true;
        let particles = [];

        // --- VARIABLES PONG ---
        const player = { x: 20, y: 200, w: 12, h: 90, color: "#00d2ff", score: 0, targetY: 200, speed: 8 };
        const computer = { x: 768, y: 200, w: 12, h: 90, color: "#ff0055", score: 0 };
        // Se sube la velocidad base de la bola a 7 para hacerla más rápida
        const ball = { x: 400, y: 250, r: 7, speedX: 7, speedY: 7, color: "#fff" };

        const keys = { ArrowUp: false, ArrowDown: false };
        let isMouseDown = false;

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = true;
                e.preventDefault();
            }
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = false;
            }
        });

        canvas.addEventListener("mousedown", () => {
            if (!gameRunning) {
                firstStart = false;
                resetCurrentGame();
            } else {
                isMouseDown = true;
            }
        });

        window.addEventListener("mouseup", () => isMouseDown = false);

        canvas.addEventListener("mousemove", (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                if (isMouseDown) {
                    player.targetY = e.clientY - rect.top - player.h / 2;
                }
            }
        });

        function resetCurrentGame() {
            gameRunning = true;
            particles = [];
            player.score = 0; computer.score = 0;
            player.y = 200; player.targetY = 200;
            resetBall();
        }

        function resetBall() {
            ball.x = canvas.width / 2; 
            ball.y = canvas.height * 0.3 + Math.random() * (canvas.height * 0.4);
            
            // Ajustada la velocidad horizontal aleatoria proporcional a la nueva velocidad más rápida (entre 6.5 y 8)
            let baseSpeedX = 6.5 + Math.random() * 1.5;
            ball.speedX = (ball.speedX > 0) ? -baseSpeedX : baseSpeedX;
            
            // Ángulo vertical ajustado para la nueva velocidad
            ball.speedY = (Math.random() - 0.5) * 10;
            
            if (Math.abs(ball.speedY) < 2) {
                ball.speedY = ball.speedY < 0 ? -3 : 3;
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) particles.push({x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, alpha:1, color});
        }

        function update(dt) {
            if (!gameRunning) return;

            const dtModifier = dt / (1000 / 60);

            if (keys.ArrowUp) player.targetY -= player.speed * dtModifier;
            if (keys.ArrowDown) player.targetY += player.speed * dtModifier;

            if (player.targetY < 0) player.targetY = 0;
            if (player.targetY > canvas.height - player.h) player.targetY = canvas.height - player.h;
            
            player.y += (player.targetY - player.y) * (1 - Math.pow(1 - 0.25, dtModifier));
            
            ball.x += ball.speedX * dtModifier; 
            ball.y += ball.speedY * dtModifier;

            if(ball.y + ball.r > canvas.height || ball.y - ball.r < 0) ball.speedY *= -1;
            
            // Movimiento e IA de la máquina (Rojo)
            computer.y += (ball.y - (computer.y + computer.h/2)) * (1 - Math.pow(1 - 0.08, dtModifier));
            
            // --- NUEVO TOPE CON PAREDES PARA EL ROJO ---
            if (computer.y < 0) computer.y = 0;
            if (computer.y > canvas.height - computer.h) computer.y = canvas.height - computer.h;

            let paddle = (ball.x < canvas.width/2) ? player : computer;
            if (ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w &&
                ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h) {
                createParticles(ball.x, ball.y, paddle.color);
                ball.speedX *= -1.05;
                ball.speedY = (ball.y - (paddle.y + paddle.h/2)) * 0.25;
            }

            if(ball.x < 0) { 
                computer.score++; 
                if(computer.score >= 10) { 
                    gameRunning = false; 
                    endMessage = "💀 ¡DERROTA!"; 
                } else {
                    resetBall(); 
                }
            }
            else if(ball.x > canvas.width) { 
                player.score++; 
                if(player.score >= 10) { 
                    gameRunning = false; 
                    endMessage = "🏆 ¡VICTORIA!"; 
                } else {
                    resetBall(); 
                }
            }
        }

        function render(dt) {
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const dtModifier = dt / (1000 / 60);

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dtModifier; p.y += p.vy * dtModifier; p.alpha -= 0.03 * dtModifier;
                if(p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
                }
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign="center";
            ctx.fillText(player.score, 200, 60); ctx.fillText(computer.score, 600, 60);
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = computer.color; ctx.fillRect(computer.x, computer.y, computer.w, computer.h);
            ctx.fillStyle = ball.color; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();

            if (!gameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,500);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "50px Arial";
                
                if (firstStart) ctx.fillStyle = "white";
                else ctx.fillStyle = endMessage.includes("VICTORIA") ? "#00d2ff" : "#ff0055";
                
                ctx.fillText(endMessage, 400, 240);
                ctx.font = "20px Arial"; ctx.fillStyle = "#00d2ff";
                ctx.fillText(firstStart ? "HAZ CLIC PARA INICIAR" : "HAZ CLIC PARA REINICIAR", 400, 300);
            }
        }

        let lastTime = performance.now();
        function loop(timestamp) {
            if (!timestamp) timestamp = performance.now();
            let dt = timestamp - lastTime;
            if (dt > 100) dt = 16.66;
            lastTime = timestamp;

            update(dt);
            render(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame((timestamp) => loop(timestamp));
    </script>
</body>
</html>
