<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Cloud Catcher</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --pink-light: #ffebf2;
            --pink-dark: #ff85b9;
            --mint: #a8e6cf;
            --star-gold: #ffd700;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #fff0f5 0%, #ffe4ef 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(255, 133, 185, 0.1);
        }

        /* --- HUD --- */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            font-size: 1.5rem;
            color: var(--pink-dark);
            background: white;
            padding: 5px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* --- PERSONAJE --- */
        #player {
            position: absolute;
            bottom: 50px;
            left: 50%;
            width: 80px;
            height: 60px;
            background: var(--white);
            border-radius: 30px 30px 10px 10px;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
            box-shadow: 0 10px 0 rgba(255, 133, 185, 0.2);
            z-index: 5;
        }

        .ear {
            position: absolute;
            top: -10px;
            width: 25px;
            height: 25px;
            background: var(--white);
            border-radius: 5px;
            transform: rotate(45deg);
        }

        .eye {
            position: absolute;
            top: 20px;
            width: 8px;
            height: 8px;
            background: var(--pink-dark);
            border-radius: 50%;
        }

        /* --- OBJETOS --- */
        .item {
            position: absolute;
            font-size: 2rem;
            user-select: none;
            cursor: default;
        }

        /* --- MENÚS --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 235, 242, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .btn {
            background: var(--pink-dark);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 133, 185, 0.4);
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.1); }

        h1 { color: var(--pink-dark); font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">✨ Puntos: <span id="score">0</span></div>
        
        <div id="player">
            <div class="ear" style="left: 10px;"></div>
            <div class="ear" style="right: 10px;"></div>
            <div class="eye" style="left: 20px;"></div>
            <div class="eye" style="right: 20px;"></div>
        </div>

        <!-- Pantalla de Inicio -->
        <div id="start-screen" class="overlay">
            <h1>Cloud Catcher</h1>
            <p style="color: #b39ddb;">¡Atrapa estrellas, evita nubes grises!</p>
            <button class="btn" onclick="startGame()">JUGAR</button>
        </div>

        <!-- Pantalla Game Over -->
        <div id="game-over" class="overlay" style="display: none;">
            <h1>¡Oh no! ☁️</h1>
            <p id="final-score" style="color: #b39ddb;"></p>
            <button class="btn" onclick="startGame()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        
        let score = 0;
        let gameActive = false;
        let playerX = 50; // Porcentaje

        // Movimiento suave con el ratón o táctil
        container.addEventListener('pointermove', (e) => {
            if (!gameActive) return;
            const rect = container.getBoundingClientRect();
            let x = ((e.clientX - rect.left) / rect.width) * 100;
            x = Math.max(5, Math.min(95, x)); // Límites
            playerX = x;
            player.style.left = `${x}%`;
        });

        function spawnItem() {
            if (!gameActive) return;

            const item = document.createElement('div');
            const isGood = Math.random() > 0.3;
            item.className = 'item';
            item.innerText = isGood ? '⭐' : '☁️';
            item.style.left = Math.random() * 90 + 5 + '%';
            item.style.top = '-50px';
            container.appendChild(item);

            let top = -50;
            const speed = 3 + (score / 10); // Aumenta dificultad

            const fallInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(fallInterval);
                    item.remove();
                    return;
                }

                top += speed;
                item.style.top = top + 'px';

                // Colisión básica
                const pRect = player.getBoundingClientRect();
                const iRect = item.getBoundingClientRect();

                if (iRect.bottom > pRect.top && 
                    iRect.top < pRect.bottom && 
                    iRect.right > pRect.left && 
                    iRect.left < pRect.right) {
                    
                    if (isGood) {
                        score += 1;
                        scoreElement.innerText = score;
                        item.remove();
                        clearInterval(fallInterval);
                    } else {
                        endGame();
                    }
                }

                // Salida de pantalla
                if (top > rect().height) {
                    item.remove();
                    clearInterval(fallInterval);
                }
            }, 20);

            setTimeout(spawnItem, Math.max(400, 1000 - (score * 10)));
        }

        function rect() { return container.getBoundingClientRect(); }

        function startGame() {
            score = 0;
            scoreElement.innerText = "0";
            gameActive = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            spawnItem();
        }

        function endGame() {
            gameActive = false;
            document.getElementById('final-score').innerText = `Conseguiste ${score} estrellas`;
            gameOverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
